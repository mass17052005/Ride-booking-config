server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Routing
spring.cloud.gateway.routes[0].id=driver-service
spring.cloud.gateway.routes[0].uri=lb://driver-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/drivers/**

spring.cloud.gateway.routes[1].id=ride-service
spring.cloud.gateway.routes[1].uri=lb://ride-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/rides/**

# Zipkin
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0

# Actuator
management.endpoints.web.exposure.include=health,metrics,info
